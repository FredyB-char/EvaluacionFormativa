<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fredy Bohle" />
    <meta name="description" content="Esta es un portal de talento Escolar" />
    <title>Portal Talento Escolar</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fondo-azul sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="../index.html">Talento Escolar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="../index.html">Inicio</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                >Categorias</a
              >
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="../html/arte.html">Arte</a>
                </li>
                <li>
                  <a class="dropdown-item" href="../html/musica.html">Música</a>
                </li>
                <li>
                  <a class="dropdown-item" href="../html/tecnologia.html"
                    >Tecnología</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="flex-grow-1 fondo-azul">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6 contenedor-principal">
            <h3 class="mb-4 text-center">Registro de Talentos</h3>

            <form>
                <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingInput" placeholder="nombre">
                <label for="floatingInput">Nombre</label>
                </div>
                <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" placeholder="nombre@ejemplo.com">
                <label for="floatingInput">Correo Electrónico</label>
                </div>

              <div class="mb-3">
                <label class="form-label">Categoria</label>
                <select class="form-select">
                  <option>Selecciona</option>
                  <option>Música</option>
                  <option>Arte</option>
                  <option>Tecnología</option>
                </select>
              </div>
                            <div class="mb-3">
                <label class="form-label">Sexo</label>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="sexo"
                    id="masculino"
                    value="masculino"
                    required
                  />
                  <label class="form-check-label" for="masculino">
                    Masculino
                  </label>
                </div>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="sexo"
                    id="femenino"
                    value="femenino"
                  />
                  <label class="form-check-label" for="femenino">
                    Femenino
                  </label>
                </div>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="sexo"
                    id="otro"
                    value="otro"
                  />
                  <label class="form-check-label" for="otro"> Otro </label>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Descripción Talento</label>
                <textarea class="form-control" rows="3"></textarea>
              </div>


              <button type="submit" class="btn btn-primary w-100">
                Enviar
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-center py-3 text-white fondo-azul">
      <p class="mb-0">Talentos escolares &copy; 2026</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
