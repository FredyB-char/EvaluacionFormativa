<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fredy Bohle" />
    <meta name="description" content="Esta es un portal de talento Escolar" />
    <title>Portal Talento Escolar</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fondo-azul sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="../index.html">Talento Escolar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="../index.html">Inicio</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                >Categorias</a
              >
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="../html/arte.html">Arte</a>
                </li>
                <li>
                  <a class="dropdown-item" href="../html/musica.html">Música</a>
                </li>
                <li>
                  <a class="dropdown-item" href="../html/tecnologia.html"
                    >Tecnología</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="flex-grow-1 fondo-azul">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6 contenedor-principal">
            <h3 class="mb-4 text-center">Registro de Talentos</h3>

            <form>
                <div class="form-floating mb-3">
                  <input type="text" class="form-control" id="nombre" placeholder="nombre">
                  <label for="nombre">Nombre</label>
                </div>

                <div class="form-floating mb-3">
                  <input type="text" class="form-control" id="apellido" placeholder="Apellido" required>
                  <label for="Apellido">Apellido</label>
                </div>
                
                  <div class="form-floating mb-3">
                    <input type="date" class="form-control" id="fecha">
                    <label for="fecha">Fecha de Nacimiento</label>
                  </div>
                  <div class="form-floating mb-3">
                  <select class="form-select" id="curso" required>
                    <option selected>Seleccionar</option>
                    <option>1° Básico</option>
                    <option>2° Básico</option>
                    <option>3° Básico</option>
                    <option>4° Básico</option>
                    <option>5° Básico</option>
                    <option>6° Básico</option>
                    <option>7° Básico</option>
                    <option>8° Básico</option>
                    <option>1° Medio</option>
                    <option>2° Medio</option>
                    <option>3° Medio</option>
                    <option>4° Medio</option>
                  </select>
                  <label for="curso">Curso</label>
                </div>

              <div class="form-floating">
                <select class="form-select" id="categoria" aria-label="">
                    <option selected>Seleccionar</option>
                    <option value="1">Artes</option>
                    <option value="2">Música</option>
                    <option value="3">Técnologia</option>
                </select>
                <label for="categoria">Categoria</label>
                </div>
                  <div class="mb-3">
                    <label class="form-label">Nivel percibido</label>
                    <input type="range" class="form-range" min="1" max="5" id="nivel">
                    <small>1 = Inicial | 5 = Muy avanzado</small>
                  </div>
                                <div class="mb-3">
                <label class="form-label">Descripción Talento</label>
                <textarea class="form-control" rows="3"></textarea>
              </div>
                        <div class="mb-3">
                      <label class="form-label">Sube evidencia</label>
                      <input type="file" class="form-control" accept="image/*,video/*,audio/*" required>
                    </div>
                      <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="apoderado" placeholder="nombre del apoderado" required>
                        <label for="apoderado">Nombre del apoderado</label>
                      </div>

              <div class="form-floating mb-3">
                <input type="tel" class="form-control" id="telefonoApoderado" placeholder="Teléfono" required>
                <label for="telefonoApoderado">Teléfono</label>
              </div>
              
                <div class="form-floating mb-3">
                  <input type="email" class="form-control" id="correo" placeholder="nombre@ejemplo.com" required>
                  <label for="correo">Correo Electrónico</label>
                </div>

              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="autorizacion" required>
                <label class="form-check-label" for="autorizacion">
                  Autorizo el uso de datos y material
                </label>
              </div>

              <div class="form-floating mb-3">
              <button type="submit" class="btn btn-primary w-100">
                Enviar
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-center py-3 text-white fondo-azul">
      <p class="mb-0">Talentos escolares &copy; 2026</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
