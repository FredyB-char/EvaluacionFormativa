<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fredy Bohle" />
    <meta name="description" content="Esta es un portal de talento Escolar" />
    <title>Portal Talento Escolar</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <script type="text/javascript" src="../js/script.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fondo-azul sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="../index.html">Talento Escolar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="../index.html">Inicio</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                >Categorias</a
              >
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="../html/arte.html">Arte</a>
                </li>
                <li>
                  <a class="dropdown-item" href="../html/musica.html">Música</a>
                </li>
                <li>
                  <a class="dropdown-item" href="../html/tecnologia.html"
                    >Tecnología</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="flex-grow-1 fondo-azul">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6 contenedor-principal">
            <h3 class="mb-4 text-center">Solicitud inscripción de talento</h3>

            <form
              id="registroTalento"
              class="needs-validation"
              method="post"
              novalidate
            >
              <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                  <button
                    class="nav-link form-btn active"
                    id="tab1-btn"
                    data-bs-toggle="tab"
                    data-bs-target="#tabEstudiante"
                  >
                    Estudiante
                  </button>
                </li>
                <li class="nav-item">
                  <button
                    class="nav-link form-btn"
                    id="tab2-btn"
                    data-bs-toggle="tab"
                    data-bs-target="#tabTalento"
                    disabled
                  >
                    Talento
                  </button>
                </li>
                <li class="nav-item">
                  <button
                    class="nav-link form-btn"
                    id="tab3-btn"
                    data-bs-toggle="tab"
                    data-bs-target="#tabApoderado"
                    disabled
                  >
                    Apoderado
                  </button>
                </li>
              </ul>

              <div class="tab-content">
                <div class="tab-pane fade show active" id="tabEstudiante">
                  <div class="row">
                    <div class="col-md-6 form-floating mb-3">
                      <input
                        type="text"
                        class="form-control"
                        id="nombre"
                        placeholder="Nombre"
                        required
                      />
                      <label for="nombre">Nombre</label>
                    </div>

                    <div class="col-md-6 form-floating mb-3">
                      <input
                        type="text"
                        class="form-control"
                        id="apellido"
                        placeholder="Apellido"
                        required
                      />
                      <label for="apellido">Apellido</label>
                    </div>
                  </div>

                  <div class="form-floating mb-3">
                    <input
                      type="number"
                      class="form-control"
                      id="edad"
                      min="5"
                      max="19"
                      placeholder="Edad"
                      required
                    />
                    <label for="edad">Edad</label>
                  </div>

                  <div class="form-floating mb-3">
                    <select class="form-select" id="curso" required>
                      <option value="">Seleccionar</option>
                      <option value="1">5° Básico</option>
                      <option value="2">6° Básico</option>
                      <option value="3">7° Básico</option>
                      <option value="4">8° Básico</option>
                      <option value="5">1° Medio</option>
                      <option value="6">2° Medio</option>
                      <option value="7">3° Medio</option>
                      <option value="8">4° Medio</option>
                    </select>
                    <label for="curso">Curso</label>
                  </div>

                  <button
                    type="button"
                    class="btn btn-primary w-100"
                    id="next1"
                  >
                    Siguiente
                  </button>
                </div>
                <div class="tab-pane fade" id="tabTalento">
                  <div class="form-floating mb-3">
                    <select class="form-select" id="categoria" required>
                      <option value="">Seleccionar</option>
                      <option value="artes">Artes</option>
                      <option value="musica">Música</option>
                      <option value="tecnologia">Tecnología</option>
                      <option value="deporte">Deporte</option>
                      <option value="ciencias">Ciencias</option>
                    </select>
                    <label for="categoria">Categoría</label>
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Nivel percibido</label>
                    <input
                      type="range"
                      class="form-range"
                      min="1"
                      max="5"
                      id="nivel"
                      required
                    />
                    <small>1 = Inicial | 5 = Muy avanzado</small>
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control" rows="3" required></textarea>
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Sube evidencia(opcional)</label>
                    <input
                      type="file"
                      class="form-control"
                      accept="image/*,video/*,audio/*"
                    />
                  </div>

                  <div class="d-flex gap-2">
                    <button
                      type="button"
                      class="btn btn-secondary w-50"
                      id="back2"
                    >
                      Volver
                    </button>
                    <button
                      type="button"
                      class="btn btn-primary w-50"
                      id="next2"
                    >
                      Siguiente
                    </button>
                  </div>
                </div>
                <div class="tab-pane fade" id="tabApoderado">
                  <div class="form-floating mb-3">
                    <input
                      type="text"
                      class="form-control"
                      id="apoderado"
                      required
                    />
                    <label for="apoderado">Nombre del apoderado</label>
                  </div>

                  <div class="form-floating mb-3">
                    <input
                      type="email"
                      class="form-control"
                      id="correoApoderado"
                      required
                    />
                    <label for="correoApoderado">Correo del apoderado</label>
                  </div>

                  <div class="form-floating mb-3">
                    <input
                      type="tel"
                      class="form-control"
                      id="telefonoApoderado"
                      required
                    />
                    <label for="telefonoApoderado"
                      >Teléfono del apoderado</label
                    >
                  </div>
                  <div class="form-check mb-3">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="autorizacion"
                      required
                    />
                    <label class="form-check-label" for="autorizacion">
                      Declaro ser el apoderado/a del estudiante y autorizo su
                      participación en este proceso. Asimismo, consiento el uso
                      de sus datos personales y del material proporcionado
                      (imágenes, videos, audios) para fines de evaluación,
                      registro y difusión del programa, conforme a la normativa
                      vigente sobre protección de datos.
                    </label>
                  </div>

                  <div class="d-flex gap-2">
                    <button
                      type="button"
                      class="btn btn-secondary w-50"
                      id="back3"
                    >
                      Volver
                    </button>

                    <div id="mensajeExito" class="alert alert-success d-none" role="alert">
                      Solicitud enviada correctamente. Nos pondremos en contacto contigo.
                    </div>

                    <button type="submit" id="btn-enviar" class="btn btn-success w-50">
                      Enviar
                    </button>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-center py-3 text-white fondo-azul">
      <p class="mb-0">Talentos escolares &copy; 2026</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
